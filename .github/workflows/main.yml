name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Remove PHP file because GitHub Pages cannot run PHP
      - name: Remove PHP file
        run: rm -f contact.php

      # Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload website files
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------------------------
  # IMPORTANT: GitHub Pages CANNOT run PHP code.
  # If you upload contact.php to GitHub Pages, it will expose your email password!
  # 
  # To deploy contact.php, you must host it on a PHP-enabled server (like your Somee host).
  # Below is an FTP deployment job you can UNCOMMENT and configure with GitHub Secrets
  # to automatically deploy contact.php to your real server.
